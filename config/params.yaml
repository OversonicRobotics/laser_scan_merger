/laser_scan_merger:
  ros__parameters:
    laser1Alpha: 0.0 #45.0
    laser1AngleMax: 181.0
    laser1AngleMin: -181.0
    laser1B: 0
    laser1G: 0
    laser1R: 255
    laser1XOff: 0.22 #0.15
    laser1YOff: 0.0 #0.12
    laser1ZOff: 0.0
    laser2Alpha: 180.0 #225.0
    laser2AngleMax: 181.0
    laser2AngleMin: -181.0
    laser2B: 0
    laser2G: 255
    laser2R: 255
    laser2XOff: -0.22 #-0.15
    laser2YOff: -0.0 #-0.12
    laser2ZOff: 0.0
    pointCloudTopic: cloud_in
    pointCloudFrameId: merged_laser_frame
    qos_overrides:
      /parameter_events:
        publisher:
          depth: 1000
          durability: volatile
          history: keep_last
          reliability: best_effort
    scanTopic1: "scanHF"
    scanTopic2: "scanHB"
    show1: true
    show2: true
    #use_sim_time: false

/pointcloud_to_laserscan:
  ros__parameters:
    angle_increment: 0.0087
    angle_max: 3.14
    angle_min: -3.14
    inf_epsilon: 1.0
    max_height: 1.0
    min_height: 0.0
    qos_overrides:
      /parameter_events:
        publisher:
          depth: 1000
          durability: volatile
          history: keep_last
          reliability: best_effort
    queue_size: 16
    range_max: 50.0
    range_min: 0.3 # it was 0.45
    scan_time: 0.3333
    target_frame: merged_laser_frame
    transform_tolerance: 0.01
    use_inf: true
    #use_sim_time: false
